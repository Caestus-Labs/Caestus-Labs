<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Caestus Labs — Coming Soon</title>
<meta name="description" content="Caestus Labs is making VR you can feel. Sign up for early access.">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/coming-soon.css">
</head>
<body>
  <canvas id="cubes" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">CAESTUS</div>
    <div class="status"><span class="dot"></span>2026</div>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">Coming Soon</p>
      <h1>Making <em>VR</em><br>you can <span class="accent">feel.</span></h1>

      <button type="button" class="cta" id="signupOpen" aria-haspopup="dialog" aria-controls="signupModal">
        <span class="label">Sign Up</span>
        <span class="arrow" aria-hidden="true">→</span>
      </button>
    </section>
  </main>

  <footer class="foot">
    <span>Caestus Labs · 2026</span>
    <a href="mailto:hello@caestuslabs.com">hello@caestuslabs.com</a>
  </footer>

  <!-- Sign-up modal -->
  <div class="modal" id="signupModal" role="dialog" aria-modal="true" aria-labelledby="signupTitle" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="document">
      <button class="modal-close" type="button" aria-label="Close" data-close>✕</button>
      <p class="eyebrow">Early Access</p>
      <h2 id="signupTitle">Get on the list.</h2>
      <p class="modal-sub">We'll email when developer kits open up.</p>

      <form class="interest" id="interestForm" novalidate>
        <div class="field">
          <label for="email" class="visually-hidden">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@company.com" autocomplete="email">
        </div>
        <div class="field name">
          <label for="name" class="visually-hidden">Name</label>
          <input id="name" name="name" type="text" required placeholder="Your name" maxlength="100" autocomplete="name">
        </div>
        <div class="field select">
          <label for="use_case" class="visually-hidden">Interest</label>
          <select id="use_case" name="use_case" required>
            <option value="" disabled selected>I'm interested as…</option>
            <option value="training">Training &amp; simulation</option>
            <option value="medical">Medical &amp; surgical</option>
            <option value="industrial">Industrial &amp; aerospace</option>
            <option value="gaming">Gaming &amp; entertainment</option>
            <option value="research">Research</option>
            <option value="other">Other</option>
          </select>
        </div>
        <button type="submit" class="submit" id="submitBtn">
          <span class="label">Notify me</span>
          <span class="arrow" aria-hidden="true">→</span>
        </button>
        <p class="status-msg" id="formStatus" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script src="/js/config.js"></script>
  <script type="module" src="/js/cubes.js"></script>
  <script type="module" src="/js/interest-form.js"></script>
  <script src="/js/modal.js" defer></script>
</body>
</html>
